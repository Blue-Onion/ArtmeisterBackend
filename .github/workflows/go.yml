# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: artmeister_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.3'

    - name: Install goose
      run: go install github.com/pressly/goose/v3/cmd/goose@latest

    - name: Run Migrations
      run: goose -dir sql/schema postgres "postgresql://postgres:password@localhost:5432/artmeister_test?sslmode=disable" up

    - name: Build
      run: go build -v ./...

    - name: Test
      env:
        TEST_DATABASE_URL: "postgresql://postgres:password@localhost:5432/artmeister_test?sslmode=disable"
        JWT_SECERT: "test-secret-key-123456789012345678901234"
      run: go test -v ./...
